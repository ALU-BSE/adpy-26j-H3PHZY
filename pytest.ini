[pytest]
DJANGO_SETTINGS_MODULE = ishemalink.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --cov=shipments
    --cov=payments
    --cov=core
    --cov=domestic
    --cov=international
    --cov-report=html
    --cov-report=term-missing
    -v
    --tb=short
testpaths = tests
norecursedirs = .git .venv venv __pycache__ *.egg-info .pytest_cache
