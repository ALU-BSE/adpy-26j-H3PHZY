version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-ishemalink_db}
      POSTGRES_USER: ${DB_USER:-ishema_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ishema_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ishema_admin -d ishemalink_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ishemalink_net

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: always
    environment:
      DB_USER: ${DB_USER:-ishema_admin}
      DB_PASSWORD: ${DB_PASSWORD:-ishema_pass}
      DB_NAME: ${DB_NAME:-ishemalink_db}
      DB_HOST: db
      DB_PORT: 5432
      PGBOUNCER_LISTEN_PORT: 6432
      PGBOUNCER_LISTEN_ADDR: 0.0.0.0
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 50
      PGBOUNCER_POOL_MODE: transaction
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ishemalink_net
    ports:
      - "6432:6432"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ishemalink_net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    command: gunicorn ishemalink.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    environment:
      - DEBUG=False
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@pgbouncer:6432/${DB_NAME}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/status/" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ishemalink_net

  celery_worker:
    build: .
    restart: always
    command: celery -A ishemalink worker -l info
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@pgbouncer:6432/${DB_NAME}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    networks:
      - ishemalink_net

  celery_beat:
    build: .
    restart: always
    command: celery -A ishemalink beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@pgbouncer:6432/${DB_NAME}
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ishemalink_net

  nginx:
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      web:
        condition: service_healthy
    networks:
      - ishemalink_net

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - ishemalink_net

  grafana:
    image: grafana/grafana:latest
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ishemalink_net

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  prometheus_data:
  grafana_data:


networks:
  ishemalink_net:
    driver: bridge
